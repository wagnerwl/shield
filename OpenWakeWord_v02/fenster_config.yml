model_name: "oww_fensterbruch_v06"
output_dir: "./Data_Frame/data"

# Da wir keine Sprache generieren, sind diese Felder egal, müssen aber da sein:
target_phrase: ["fensterbruch"] 
custom_negative_phrases: []
n_samples: 1006
n_samples_val: 178
tts_batch_size: 50
# piper_sample_generator_path: "OpenWakeWord_v02/"

# Augmentation (Hier passiert die Magie)
augmentation_batch_size: 16
augmentation_rounds: 20 # Erstellt 20 leicht veränderte Versionen jedes Originalclips, um das Modell robuster zu machen

# Diese drei Zeilen hinzufügen, damit das Skript nicht meckert:
rir_paths: []
background_paths: []
background_paths_duplication_rate: []

# Pfade zu den generellen Hintergrundgeräuschen (die du in Schritt 2 geladen hast)
false_positive_validation_data_path: "./OpenWakeWord_v02/validation_set_features.npy"
feature_data_files:
  "ACAV100M_sample": "OpenWakeWord_v02/openwakeword_features_ACAV100M_2000_hrs_16bit.npy"

# Batch-Konfiguration (Wie viele Clips pro Trainingsschritt)
batch_n_per_class:
  "ACAV100M_sample": 1024
  "adversarial_negative": 250 # Das sind die Negative Geräusche
  "positive": 250             # Das sind die Glasbrüche 

# Modell-Größe und Trainingsschritte
model_type: "dnn"   # dnn --> Deep Neural Network
layer_size: 32      # --> 32 Neuronen pro Schicht
steps: 25000        # Trainingsschritte: Je mehr Schritte, desto besser (aber auch länger die Trainingszeit)

max_negative_weight: 2500
target_false_positives_per_hour: 0.1